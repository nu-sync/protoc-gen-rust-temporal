name: interop

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TS_TEMPORAL_VERSION: "0.1.0"
  TEMPORAL_CLI_CACHE: /tmp/temporal-sdk-rust-0.1.0

jobs:
  ts-client-to-rust-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Clone interop harness
        run: git clone --depth 1 https://github.com/nu-sync/protoc-gen-temporal-interop interop

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: interop/ts-client/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache interop harness tools
        uses: actions/cache@v4
        with:
          path: |
            interop/.dev-tools
            ${{ env.TEMPORAL_CLI_CACHE }}
          key: interop-tools-${{ runner.os }}-ts-${{ env.TS_TEMPORAL_VERSION }}-${{ hashFiles('interop/pins/versions.env', 'interop/Cargo.lock', 'interop/crates/interop-harness/src/main.rs') }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            interop -> target

      - name: Build local Rust generator
        run: cargo build -p protoc-gen-rust-temporal

      - name: Run interop harness
        working-directory: interop
        env:
          RUST_TEMPORAL_PLUGIN: ${{ github.workspace }}/target/debug/protoc-gen-rust-temporal
          RUST_TEMPORAL_WORKSPACE: ${{ github.workspace }}
          TS_TEMPORAL_VERSION: ${{ env.TS_TEMPORAL_VERSION }}
        run: cargo run -p interop-harness -- test

      - name: Summarize interop timing
        if: always()
        run: |
          {
            echo "## Interop CI timing"
            echo
            echo "Compare this run against the pre-cache baseline:"
            echo
            echo '```sh'
            echo "gh run view $GITHUB_RUN_ID --repo $GITHUB_REPOSITORY --json jobs"
            echo "gh run view $GITHUB_RUN_ID --repo $GITHUB_REPOSITORY --job <job-id> --log"
            echo '```'
            echo
            echo "Use one cold run and one warm rerun. The warm run should show cache hits for npm, interop tools, and the two Cargo workspaces."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print interop logs
        if: failure()
        run: |
          if [ -d interop/.dev-logs ]; then
            for log in interop/.dev-logs/*.log; do
              echo "::group::$(basename "$log")"
              sed -n '1,240p' "$log"
              echo "::endgroup::"
            done
          fi

      - name: Upload interop logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: interop-dev-logs
          path: interop/.dev-logs
          include-hidden-files: true
          if-no-files-found: ignore
