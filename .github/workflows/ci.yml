name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        run: rustup toolchain install 1.88 --profile minimal
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo +1.88 build --workspace --all-targets

  verify-bridge:
    # Phase 1 exit criterion: prove the bridge crate is wire-compatible
    # with the plugin's emit. Builds examples/job-queue-integration with
    # --features bridge and clippy-cleans it. Default workspace builds
    # remain SDK-free — this is the dedicated bridge gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Build bridge crate
        run: cargo build -p temporal-proto-runtime-bridge --all-targets
      - name: Bridge crate tests
        run: cargo test -p temporal-proto-runtime-bridge
      - name: Verify example against bridge
        run: |
          cargo check -p job-queue-integration-example --features bridge
          cargo clippy -p job-queue-integration-example --features bridge --all-targets -- -D warnings
          cargo check -p job-queue-integration-example --features worker
          cargo clippy -p job-queue-integration-example --features worker --all-targets -- -D warnings
          cargo check -p job-queue-integration-example --features cli
          cargo clippy -p job-queue-integration-example --features cli --all-targets -- -D warnings

  compat-audit:
    # Cross-language wire-format audit. Runs both the Rust and Go arms of
    # compat-tests/ and asserts the per-fixture Payload JSON diffs are empty.
    # If this fails, our generated clients no longer speak the same triple as
    # cludden/protoc-gen-go-temporal — interop is broken until it's resolved.
    # See WIRE-FORMAT.md "Compatibility audit" for the contract being checked.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: Generate Go protobuf types
        working-directory: compat-tests/go
        run: |
          mkdir -p gen
          protoc --proto_path=../rust/proto \
                 --go_out=gen \
                 --go_opt=paths=source_relative \
                 jobs/v1/jobs.proto
      - name: Rust arm
        run: cargo run -p compat-tests-rust -- generate
      - name: Go arm
        working-directory: compat-tests/go
        run: go run . generate
      - name: Diff payloads
        run: |
          set -e
          status=0
          for f in compat-tests/fixtures/*.rust.payload.json; do
            g="${f%.rust.payload.json}.go.payload.json"
            if ! diff -u "$f" "$g"; then
              status=1
            fi
          done
          exit $status
