name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rustfmt
        run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  codegen-idempotence:
    # Prove the checked-in job-queue Temporal client is exactly what the
    # repo-local plugin emits through buf generate. The prost-owned files are
    # intentionally left to cargo check because their formatting varies by the
    # installed generator path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "34.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.68.4"
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc-gen-prost
        run: cargo install protoc-gen-prost --version 0.5.0 --locked
      - name: Build repo-local plugin
        run: cargo build -p protoc-gen-rust-temporal
      - name: Regenerate job-queue sources
        run: cd examples/job-queue/proto && PATH="${GITHUB_WORKSPACE}/target/debug:${PATH}" buf generate
      - name: Format generated Rust
        run: cargo fmt -p jobs-proto
      - name: Assert Temporal generated source is current
        run: git diff --exit-code -- examples/job-queue/crates/jobs-proto/src/gen/jobs/v1/jobs_temporal.rs

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        run: rustup toolchain install 1.88 --profile minimal
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo +1.88 build --workspace --all-targets

  verify-bridge:
    # Prove the bridge crate still builds and the primary job-queue example
    # compiles against its generated client/runtime surface.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Build bridge crate
        run: cargo build -p temporal-proto-runtime-bridge --all-targets
      - name: Bridge crate tests
        run: cargo test -p temporal-proto-runtime-bridge
      - name: Verify example against bridge
        run: |
          cargo check -p jobs-proto -p job-worker -p job-api -p jobctl --all-targets
          cargo clippy -p jobs-proto -p job-worker -p job-api -p jobctl --all-targets -- -D warnings

  compat-audit:
    # Cross-language wire-format audit. Runs both the Rust and Go arms of
    # compat-tests/ and asserts the per-fixture Payload JSON diffs are empty.
    # If this fails, our generated clients no longer speak the same triple as
    # cludden/protoc-gen-go-temporal — interop is broken until it's resolved.
    # See WIRE-FORMAT.md "Compatibility audit" for the contract being checked.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: Generate Go protobuf types
        working-directory: compat-tests/go
        run: |
          mkdir -p gen
          protoc --proto_path=../rust/proto \
                 --go_out=gen \
                 --go_opt=paths=source_relative \
                 jobs/v1/jobs.proto
      - name: Rust arm
        run: cargo run -p compat-tests-rust -- generate
      - name: Go arm
        working-directory: compat-tests/go
        run: go run . generate
      - name: Diff payloads
        run: |
          set -e
          status=0
          for f in compat-tests/fixtures/*.rust.payload.json; do
            g="${f%.rust.payload.json}.go.payload.json"
            if ! diff -u "$f" "$g"; then
              status=1
            fi
          done
          exit $status
