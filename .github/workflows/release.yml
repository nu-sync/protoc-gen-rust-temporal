name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Linux-only matrix for now — macOS and Windows runners are several
      # times more expensive per minute and aren't load-bearing for the
      # BSR Remote Plugin (which is Linux-only by definition) or for the
      # crates.io publish. Add darwin / windows entries back once the
      # Linux build is stable and downstream demand justifies the cost.
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            linker: aarch64-linux-gnu-gcc
            cross_apt: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install cross compiler (Linux aarch64)
        if: matrix.cross_apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cross_apt }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        run: rustup target add ${{ matrix.target }}

      - name: Configure linker
        if: matrix.linker
        shell: bash
        run: |
          target_upper=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${target_upper}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin protoc-gen-rust-temporal

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="protoc-gen-rust-temporal-${version}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/protoc-gen-rust-temporal" "dist/$name/"
          cp README.md LICENSE WIRE-FORMAT.md "dist/$name/"
          cd dist
          tar -czf "$name.tar.gz" "$name"
          echo "asset=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}

  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crates:
    name: cargo publish
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      # Publish the runtime first; the plugin crate doesn't depend on it, but
      # consumers will pull both and `cargo publish` won't accept a plugin
      # release that references an unpublished dep in the future.
      - name: cargo publish temporal-proto-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p temporal-proto-runtime --allow-dirty
      - name: cargo publish protoc-gen-rust-temporal
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p protoc-gen-rust-temporal --allow-dirty

  # BSR remote-plugin distribution: removed.
  #
  # Modern buf (≥1.50) retired `buf alpha plugin push`. Self-hosted codegen
  # plugins on BSR are no longer reachable via CLI — the official path is
  # to submit a PR to https://github.com/bufbuild/plugins under
  # `plugins/community/nu-sync/protoc-gen-rust-temporal/v<version>/` with
  # the repo's Dockerfile + buf.plugin.yaml. The Buf team reviews, merges,
  # builds the image, and hosts it as `buf.build/nu-sync/rust-temporal`.
  # See docs/bsr-publish.md for the curated-plugin submission checklist.
