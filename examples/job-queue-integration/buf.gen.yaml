version: v2

inputs:
  - directory: proto

plugins:
  # Generate prost types for the proto messages.
  - local: protoc-gen-prost
    out: src/jobs
    opt:
      - bytes=.
      - file_descriptor_set

  # Generate the typed Temporal client. Headline form uses the BSR remote
  # plugin so consumers don't need a local install:
  - remote: buf.build/nu-sync/rust-temporal
    out: src/gen

  # Fallback: locally-installed binary. Uncomment and comment out the
  # remote line while iterating on the plugin source.
  # - local: protoc-gen-rust-temporal
  #   out: src/gen
