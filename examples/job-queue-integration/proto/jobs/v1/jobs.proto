syntax = "proto3";

package jobs.v1;

import "google/protobuf/empty.proto";
import "temporal/v1/temporal.proto";

// Mirrors the PoC's service in job-queue/proto/jobs/v1/jobs.proto, but
// annotated against cludden's schema (the published one) instead of the
// PoC's vendored copy. This is the proto Phase 5 ports job-queue onto.
service JobService {
  option (temporal.v1.service) = {
    task_queue: "jobs"
  };

  rpc RunJob(JobInput) returns (JobOutput) {
    option (temporal.v1.workflow) = {
      id: "job-{{ .Name }}"
      execution_timeout: { seconds: 3600 }
      signal: [{ ref: "CancelJob", start: true }]
      query:  [{ ref: "GetStatus" }]
    };
  }

  rpc CancelJob(CancelJobInput) returns (google.protobuf.Empty) {
    option (temporal.v1.signal) = {};
  }

  rpc GetStatus(google.protobuf.Empty) returns (JobStatusOutput) {
    option (temporal.v1.query) = {};
  }

  rpc ProcessChunk(ChunkInput) returns (ChunkOutput) {
    option (temporal.v1.activity) = {};
  }
}

message JobInput {
  string name = 1;
  bytes payload = 2;
}

message JobOutput {
  string id = 1;
  bool success = 2;
}

message CancelJobInput {
  string reason = 1;
}

message JobStatusOutput {
  string state = 1;
  int32 progress_pct = 2;
}

message ChunkInput {
  bytes payload = 1;
}

message ChunkOutput {
  string checksum = 1;
}
