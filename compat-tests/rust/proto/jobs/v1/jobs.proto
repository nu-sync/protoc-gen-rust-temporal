syntax = "proto3";

// Fixture types used by the cross-language wire-format audit.
// Kept structurally minimal so a hand-rolled Go side can mirror them
// without pulling in extra deps. See ../README.md for the audit procedure.

package jobs.v1;

// Go output path for the audit's Go arm. Ignored by every other language.
option go_package = "github.com/nu-sync/protoc-gen-rust-temporal/compat-tests/go/gen/jobs/v1;jobsv1";

message JobInput {
  string name = 1;
}

message JobOutput {
  string id = 1;
}

// Nested-message fixture: a batch wraps an input plus scalar metadata.
// Exercises field-number ordering across mixed scalar / message fields and
// the prost-vs-Go encoding of an embedded sub-message.
message JobBatch {
  string batch_id = 1;
  JobInput input = 2;
  int32 priority = 3;
}

// Repeated-field fixture: a list of inputs. Exercises packed/unpacked wire
// encoding of a repeated message field (proto3: repeated messages are always
// length-delimited and non-packed).
message JobList {
  repeated JobInput items = 1;
}

// Oneof fixture: exercises both scalar and nested-message arms across
// languages. Each fixture sets exactly one arm, matching protojson's oneof
// input shape.
message JobChoice {
  oneof target {
    string name = 1;
    JobInput input = 2;
  }
}

// Enum fixture: the zero value should elide from proto3 wire bytes, while a
// non-zero value should encode explicitly.
enum JobKind {
  JOB_KIND_UNSPECIFIED = 0;
  JOB_KIND_BATCH = 1;
}

message JobEnum {
  JobKind kind = 1;
}

// Map fixture: use a single-entry fixture so Go map iteration order cannot
// make byte output nondeterministic.
message JobMap {
  map<string, JobInput> inputs = 1;
}
