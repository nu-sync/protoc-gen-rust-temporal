syntax = "proto3";

package jobs.v1;

import "google/protobuf/empty.proto";
import "temporal/v1/temporal.proto";

service JobService {
  option (temporal.v1.service) = {
    task_queue: "jobs"
  };

  rpc RunJob(JobInput) returns (JobOutput) {
    option (temporal.v1.workflow) = {
      id: "{{ .Name }}"
      signal: [{ ref: "CancelJob", start: true }]
      query:  [{ ref: "GetStatus" }]
      update: [{ ref: "Reconfigure" }]
    };
  }

  rpc CancelJob(CancelJobInput) returns (google.protobuf.Empty) {
    option (temporal.v1.signal) = {};
  }

  rpc GetStatus(google.protobuf.Empty) returns (JobStatusOutput) {
    option (temporal.v1.query) = {};
  }

  rpc Reconfigure(ReconfigureInput) returns (ReconfigureOutput) {
    option (temporal.v1.update) = { validate: true };
  }

  rpc ProcessChunk(ChunkInput) returns (ChunkOutput) {
    option (temporal.v1.activity) = {};
  }
}

message JobInput { string name = 1; }
message JobOutput { string id = 1; }
message CancelJobInput { string reason = 1; }
message JobStatusOutput { string state = 1; }
message ReconfigureInput { int32 priority = 1; }
message ReconfigureOutput { bool accepted = 1; }
message ChunkInput { bytes data = 1; }
message ChunkOutput { uint64 hash = 1; }
